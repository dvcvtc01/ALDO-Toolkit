services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aldo
      POSTGRES_USER: aldo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aldo}
    volumes:
      - aldo-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - aldo-redis-data:/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: npm run start -w apps/api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgres://aldo:${POSTGRES_PASSWORD:-aldo}@postgres:5432/aldo
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DATA_DIR: /workspace/.data
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - aldo-api-data:/workspace/.data

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: npm run start -w apps/worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://aldo:${POSTGRES_PASSWORD:-aldo}@postgres:5432/aldo
      REDIS_URL: redis://redis:6379
      DATA_DIR: /workspace/.data
    depends_on:
      - postgres
      - redis
    volumes:
      - aldo-api-data:/workspace/.data

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: npm run start -w apps/web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  aldo-postgres-data:
  aldo-redis-data:
  aldo-api-data:
